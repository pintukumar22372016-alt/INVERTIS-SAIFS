{% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Student Doubt Portal</h3>

        </div>
        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>Subject</label>

                    <input type="text"class=" form-control" name="subject">
                </div>

                <div class="mb-3">

                    <label>Ask Your Doubt</label>

                    <textarea class="form-control" rows="5" name="question"></textarea>

                </div>

                <button class="btn btn-primary">Submit Doubt</button>
            </form>

            <hr>

            <h4>Recent Doubts</h4>

            {% for doubt in doubts %}

            <div class="card mb-3">

                <div class="card-body">

                    <strong> {{ doubt.subject }}</strong>

                    <p> {{ doubt.question }}</p>

                    <hr>

                    <b>Teacher Response:</b>

                    <p> {{ doubt.answer }}</p>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

{% include 'footer.html' %}
