<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign Up — INVERTIS SAIFS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="{{ url_for('static', filename='css/saifs.css') }}" rel="stylesheet">
</head>
<body>
<div class="auth-bg">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100 py-4">
      <div class="col-12 col-md-6 col-lg-5">
        <div class="auth-card fade-in-up">
          <div class="text-center mb-4">
            <div class="auth-logo">🎓</div>
            <h1 class="h4 fw-800 mt-3" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Poppins',sans-serif;font-weight:700">INVERTIS SAIFS</h1>
          </div>

          <h2 class="h5 fw-700 mb-1" style="color:var(--text);font-family:'Poppins',sans-serif;font-weight:600">Create Account ✨</h2>
          <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem">Join INVERTIS SAIFS — your college academic portal</p>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 px-3" style="border-radius:10px;font-size:0.85rem">{{ message }}</div>
            {% endfor %}{% endif %}
          {% endwith %}

          <form method="POST" class="form-saifs">
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-person me-1"></i>Full Name</label>
              <input type="text" name="name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-person-badge me-1"></i>College ID</label>
              <input type="text" name="college_id" class="form-control" placeholder="BCS2020345" required autocomplete="username" pattern="[A-Za-z]{2,4}[0-9]{4,9}" title="Enter a valid College ID e.g. BCS2020345">
            </div>
            <div class="mb-3">
              <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
              <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required minlength="6">
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label"><i class="bi bi-person-badge me-1"></i>Role</label>
                <select name="role" class="form-select" required>
                  <option value="student">🎓 Student</option>
                  <option value="teacher">👨‍🏫 Teacher</option>
                  <option value="parent">👨‍👩‍👧 Parent</option>
                  <option value="admin">🛡️ Admin</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label"><i class="bi bi-building me-1"></i>Department</label>
                <select name="department" class="form-select">
                  <option>Computer Science</option>
                  <option>Information Technology</option>
                  <option>Electronics</option>
                  <option>Mechanical</option>
                  <option>Civil</option>
                  <option>Management</option>
                  <option>General</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn-saifs btn-primary-saifs w-100 justify-content-center py-3" style="font-size:0.95rem">
              <i class="bi bi-person-plus"></i> Create Account
            </button>
          </form>

          <div class="text-center mt-4" style="font-size:0.85rem;color:var(--text-muted)">
            Already have an account? <a href="/login" style="color:var(--primary);font-weight:600">Sign In</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/saifs.js') }}"></script>
</body>
</html>
