<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">

<link rel="stylesheet"href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5">

    <h2 class="mb-4">
        Admin Dashboard
    </h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card bg-primary text-white shadow">

                <div class="card-body">

                    <h1>{{ users }}</h1>

                    <h5>Total Users</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-success text-white shadow">

                <div class="card-body">

                    <h1>{{ feedback }}</h1>

                    <h5>Feedback</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-danger text-white shadow">

                <div class="card-body">

                    <h1>{{ complaints }}</h1>

                    <h5>Complaints</h5>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-warning text-dark shadow">

                <div class="card-body">

                    <h1>{{ doubts }}</h1>

                    <h5>Doubts</h5>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
