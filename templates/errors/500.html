<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Server Error — SAIFS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link href="{{ url_for('static', filename='css/saifs.css') }}" rel="stylesheet">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
  <div class="text-center fade-in-up">
    <div style="font-size:6rem;margin-bottom:1rem">⚠️</div>
    <h1 style="font-size:5rem;font-weight:800;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent">500</h1>
    <h2 style="color:var(--text);font-weight:700;margin-bottom:0.5rem">Internal Server Error</h2>
    <p style="color:var(--text-muted);max-width:400px;margin:0 auto 2rem">Something went wrong on our end. Our team has been notified. Please try again.</p>
    <a href="/" class="btn-saifs btn-primary-saifs" style="font-size:1rem;padding:0.75rem 2rem"><i class="bi bi-arrow-clockwise"></i> Try Again</a>
  </div>
</div>
<script src="{{ url_for('static', filename='js/saifs.js') }}"></script>
</body>
</html>
